# nginx config for the production frontend image.
#
# The SPA bundle lives at /usr/share/nginx/html and any unknown URL falls back
# to /index.html (so React-router routes work on full-page reload — once Task 19
# adds the router).
#
# /api and /actuator are reverse-proxied to the backend service. The upstream
# host is `backend` — the Docker Compose service name. Override at deploy time
# via the BACKEND_UPSTREAM env if running outside Compose.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static SPA assets — long cache for hashed bundle files.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Backend reverse-proxy. Same-origin from the browser's perspective, so
    # no CORS concerns regardless of where the backend actually runs.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — every other path returns index.html so the React router
    # owns it.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
