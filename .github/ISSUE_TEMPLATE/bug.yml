name: "🐛 Bug"
description: "Report a bug found during development or testing"
title: "[Bug] "
labels: ["type/bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened
      description: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the service with `docker-compose up`
        2. Send POST /transactions with body {...}
        3. Send the same request again
        4. Observe duplicate transaction created
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error messages
      render: shell
