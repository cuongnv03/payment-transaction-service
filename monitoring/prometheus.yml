global:
  scrape_interval: 15s       # how often to pull metrics
  evaluation_interval: 15s   # how often to evaluate alerting rules

scrape_configs:
  - job_name: 'payment-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      # host.docker.internal resolves to the host machine from inside Docker
      # Works on Docker Desktop (Mac/Windows). On Linux, use host-gateway
      # or the host's IP (run: ip route show default | awk '/default/ {print $3}')
      - targets: ['host.docker.internal:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'payment-service'
